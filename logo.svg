<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C6BFF"/>
      <stop offset="1" stop-color="#9A3CE0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g fill="#ffffff">
    <!-- section repliée (haut) avec chevron -->
    <rect x="118" y="104" width="276" height="52" rx="16"/>
    <!-- section dépliée (milieu) : grille de tuiles -->
    <rect x="118" y="180" width="80" height="72" rx="14"/>
    <rect x="216" y="180" width="80" height="72" rx="14"/>
    <rect x="314" y="180" width="80" height="72" rx="14"/>
    <rect x="118" y="268" width="80" height="72" rx="14"/>
    <rect x="216" y="268" width="80" height="72" rx="14"/>
    <rect x="314" y="268" width="80" height="72" rx="14"/>
    <!-- section repliée (bas) avec chevron -->
    <rect x="118" y="364" width="276" height="52" rx="16"/>
  </g>
  <!-- chevrons (accordéon) dans la couleur du fond -->
  <g fill="none" stroke="#8B54EE" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="350,124 364,138 378,124"/>
    <polyline points="350,384 364,398 378,384"/>
